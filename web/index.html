<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="newmed">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="Logo.png" />
  <link rel="apple-touch-icon" href="Logo.png">

  <title>UCommittee</title>
  <meta name="apple-mobile-web-app-title" content="NewMed">
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
<script>
  window.addEventListener('load', function (ev) {
    _flutter.loader.loadEntrypoint({
      onEntrypointLoaded: function (engineInitializer) {
        engineInitializer.initializeEngine({
          // Gunakan renderer HTML untuk kecepatan loading
          webRenderer: "html",
        }).then(function (appRunner) {
          // Hilangkan loading indicator manual kamu di sini sebelum runApp
          var loading = document.getElementById("loading");
          if (loading) loading.remove();
          appRunner.runApp();
        });
      }
    });
  });
</script>

<div id="loading">
  <style>
    #loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #F0E68C;
      font-family: sans-serif;
    }

    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #000;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <img src="Logo.png" style="width: 80px; margin-bottom: 20px;">
  <div class="spinner"></div>
  <p style="margin-top: 20px; font-weight: bold;">Preparing NewMed Experience...</p>
</div>

<link rel="manifest" href="manifest.json">
<link rel="preload" href="manifest.json" as="fetch" crossorigin="anonymous">

</html>
